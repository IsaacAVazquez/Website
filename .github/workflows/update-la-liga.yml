name: Refresh La Liga Snapshot

on:
  schedule:
    # Daily at 06:30 UTC during the La Liga season (Aug–May). Skipped Jun/Jul
    # because the league is on summer break — no fixtures, no standings
    # changes, so the daily run would just burn minutes.
    - cron: "30 6 * 1-5,8-12 *"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-la-liga
  cancel-in-progress: false

jobs:
  refresh-la-liga:
    name: Refresh La Liga Snapshot
    runs-on: ubuntu-latest
    # Cap a hung football-data.org call so we don't burn 6 hours of runner.
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh La Liga snapshot
        run: npm run update:la-liga
        env:
          FOOTBALL_DATA_API_TOKEN: ${{ secrets.FOOTBALL_DATA_API_TOKEN }}
          NODE_ENV: production

      # Quality gate: require ≥18 clubs in standings before we'll commit.
      # La Liga is a 20-team league; <18 means the upstream returned a
      # truncated/empty payload. Refusing to commit prevents pushing a
      # degraded snapshot that the site would then display.
      - name: Verify La Liga snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const SNAPSHOT_PATH = path.join('src', 'data', 'laLigaSnapshot.ts');
          const raw = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          // The snapshot is an exported object literal — extract the JSON-ish
          // payload between the assignment '= {' and the trailing '};'.
          // Anchoring on '= {' avoids matching the '{' inside the
          // 'import type { … }' line at the top of the file.
          const assign = raw.indexOf('= {');
          const end = raw.lastIndexOf('};');
          if (assign === -1 || end === -1 || end <= assign) {
            console.error('::error::Could not locate snapshot object in laLigaSnapshot.ts');
            process.exit(1);
          }
          const start = assign + 2;
          let snapshot;
          try {
            snapshot = JSON.parse(raw.slice(start, end + 1));
          } catch (err) {
            console.error('::error::Failed to parse laLigaSnapshot.ts payload:', err.message);
            process.exit(1);
          }

          const clubsCount = Array.isArray(snapshot.clubs) ? snapshot.clubs.length : 0;
          const teamSnapshotCount = snapshot.teamSnapshots ? Object.keys(snapshot.teamSnapshots).length : 0;
          console.log('Clubs in standings:', clubsCount);
          console.log('Team snapshots:', teamSnapshotCount);

          // La Liga has 20 clubs. Allow a small slack of 2 (e.g. mid-season
          // promotion/relegation paperwork) but anything below 18 is broken.
          const MIN_CLUBS = 18;
          if (clubsCount < MIN_CLUBS) {
            console.error('::error::Standings has only ' + clubsCount + ' clubs (expected ≥' + MIN_CLUBS + '). Refusing to commit a degraded snapshot.');
            process.exit(1);
          }

          fs.writeFileSync(process.env.GITHUB_OUTPUT, 'clubs_count=' + clubsCount + '\nteam_snapshots=' + teamSnapshotCount + '\n', { flag: 'a' });
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/laLigaSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/laLigaSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/laLigaSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh la liga snapshot [automated] [skip ci]" \
            src/data/laLigaSnapshot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Snapshot commits carry [skip ci], so the live site otherwise only picks
      # up the refresh on the daily cron-job.org build hook. This deploys
      # promptly when the snapshot actually changed, and no-ops until the
      # NETLIFY_BUILD_HOOK secret is configured.
      - name: Trigger Netlify deploy
        if: steps.check_changes.outputs.changed == 'true'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "NETLIFY_BUILD_HOOK secret not configured; skipping deploy trigger."
            exit 0
          fi
          curl -fsS -X POST -d '{}' "$NETLIFY_BUILD_HOOK" \
            && echo "Netlify build hook triggered." \
            || echo "::warning::Netlify build hook request failed; the daily scheduled rebuild will pick up the snapshot."

      - name: Create job summary
        if: always()
        run: |
          echo "## La Liga Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Daily at 06:30 UTC, Aug–May" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.verify_quality.outputs.clubs_count }}" ]; then
            echo "**Clubs in standings:** ${{ steps.verify_quality.outputs.clubs_count }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Team snapshots:** ${{ steps.verify_quality.outputs.team_snapshots }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ La Liga snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ La Liga snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `La Liga refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh La Liga Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- football-data.org rate limit (10 req/min on free tier)`,
              `- football-data.org token missing or invalid`,
              `- Quality gate caught a degraded snapshot (< 18 clubs in standings)`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'la-liga-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['la-liga-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'la-liga-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
