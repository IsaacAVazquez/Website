name: Refresh Golf Snapshot

on:
  # Tournament rounds move quickly Thursday through Sunday, so refresh every
  # three hours then and once daily on quieter weekdays.
  schedule:
    - cron: "40 */3 * * 0,4-6"
    - cron: "40 8 * * 1-3"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-golf
  cancel-in-progress: false

jobs:
  refresh-golf:
    name: Refresh Golf Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh golf snapshot
        run: npm run update:golf
        env:
          NODE_ENV: production

      - name: Verify refresh freshness
        run: npx tsx scripts/verifyDataRefresh.ts golf

      - name: Verify golf snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');

          const SNAPSHOT_PATH = 'src/data/golfSnapshot.ts';
          const MIN_PLAYERS = 5;

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const golfSnapshot: GolfSnapshot = (\{[\s\S]*\});\s*$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on golf snapshot body: ' + String(err));
            process.exit(1);
          }

          const summary = snapshot.summary ?? {};
          const tournament = summary.tournament ?? null;
          const leaderboard = Array.isArray(summary.leaderboard) ? summary.leaderboard.length : 0;
          const players = Array.isArray(summary.players) ? summary.players.length : 0;

          console.log('Tournament:', tournament && tournament.name);
          console.log('Leaderboard entries:', leaderboard);
          console.log('Player options:', players);
          console.log('Generated at:', tournament && tournament.generatedAt);

          if (!tournament || !tournament.name) {
            console.error('::error::Golf snapshot has no tournament.');
            process.exit(1);
          }

          if (leaderboard < MIN_PLAYERS) {
            console.error('::error::Refusing to commit a degraded golf snapshot. Expected at least ' + MIN_PLAYERS + ' players, got ' + leaderboard + '.');
            process.exit(1);
          }

          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            'tournament=' + ((tournament && tournament.name) || '') + '\n' +
              'leaderboard=' + leaderboard + '\n' +
              'players=' + players + '\n',
            { flag: 'a' }
          );
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/golfSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/golfSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/golfSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh golf snapshot [automated] [skip ci]" \
            src/data/golfSnapshot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create job summary
        if: always()
        # Pass step outputs through the environment rather than interpolating
        # ${{ }} straight into the script. The tournament name comes from ESPN
        # (untrusted), so direct interpolation under `contents: write` would be a
        # shell-injection surface; as an env var the shell treats it as data.
        env:
          TOURNAMENT: ${{ steps.verify_quality.outputs.tournament }}
          LEADERBOARD: ${{ steps.verify_quality.outputs.leaderboard }}
          PLAYERS: ${{ steps.verify_quality.outputs.players }}
        run: |
          echo "## Golf Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Daily at 08:40 UTC" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$LEADERBOARD" ]; then
            echo "**Tournament:** $TOURNAMENT" >> "$GITHUB_STEP_SUMMARY"
            echo "**Leaderboard entries:** $LEADERBOARD" >> "$GITHUB_STEP_SUMMARY"
            echo "**Player options:** $PLAYERS" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "Golf snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Golf snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Golf refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh Golf Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- ESPN golf API outage or timeout`,
              `- Quality gate caught a degraded snapshot`,
              `- Git push rejected after 5 retries`,
              ``,
              `The refresh keeps the previous snapshot when ESPN is unreachable, so a transient outage will not wipe the leaderboard.`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'golf-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['golf-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'golf-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
