name: Publish Refreshed Data

on:
  workflow_run:
    workflows:
      - Refresh Earthquake Snapshot
      - Refresh Bay Area Transit Snapshot
      - Refresh World Cup Snapshot
      - Refresh MLB Snapshot
      - Refresh NBA Snapshot
      - Refresh NFL Snapshot
      - Refresh Golf Snapshot
      - Refresh Formula 1 Snapshot
      - Refresh GitHub Trending Snapshot
      - Refresh SpaceX Snapshots
      - Refresh Premier League Snapshot
      - Refresh La Liga Snapshot
      - Update Fantasy Football Snapshots
      - Refresh Investments Snapshots
      - Refresh Polling Snapshot
      - Refresh Score Pools Snapshot
    types: [completed]
  workflow_dispatch:

concurrency:
  group: publish-refreshed-data
  cancel-in-progress: true

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout current main
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Compute expected data ledger revision
        id: ledger
        run: echo "revision=$(npx tsx scripts/printDataLedgerRevision.ts)" >> "$GITHUB_OUTPUT"

      - name: Publish and verify the complete ledger
        env:
          EXPECTED_REVISION: ${{ steps.ledger.outputs.revision }}
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          PRODUCTION_DATA_REVISION_URL: ${{ secrets.PRODUCTION_DATA_REVISION_URL }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "::error::NETLIFY_BUILD_HOOK is required for data publication."
            exit 1
          fi
          revision_url="${PRODUCTION_DATA_REVISION_URL:-https://isaacavazquez.com/api/data-revisions}"
          node scripts/ci/ensure-production-data-ledger.mjs \
            "$EXPECTED_REVISION" "$revision_url" "$NETLIFY_BUILD_HOOK"

      - name: Open or update publication incident
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = "Production data publication failed";
            const body = `The refreshed data ledger did not reach production.\n\nRun: ${runUrl}\n\nCheck the Netlify build hook, production deploy log, and access policy for /api/data-revisions.`;
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "data-publication-failure",
              per_page: 5,
            });
            if (open.data.length) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: open.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["data-publication-failure", "automation"],
              });
            }

      - name: Close resolved publication incidents
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const open = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "data-publication-failure",
              per_page: 20,
            });
            for (const issue of open.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "Production now serves the expected data ledger revision. Closing this incident.",
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
              });
            }
