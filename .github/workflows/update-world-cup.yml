name: Refresh World Cup Snapshot

on:
  # The cron only fires in June and July, the months a World Cup can run, but a
  # coarse month gate isn't enough: with the 2026 tournament over, an unguarded
  # schedule would still wake every 30 minutes each following June and July and
  # commit no-op churn. The "Determine tournament window" step below reads the
  # start and end dates out of the committed snapshot and skips the refresh
  # entirely outside a short window around them, so the workflow self-arms when a
  # future tournament's dates are seeded and stays dormant the rest of the time.
  # ESPN's site API needs no token.
  schedule:
    # Staggered off :20 so it doesn't race the hourly earthquake and 6h transit
    # refreshes (which also push to main) over the same minute.
    - cron: "20,50 * * 6,7 *"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-world-cup
  cancel-in-progress: false

jobs:
  refresh-world-cup:
    name: Refresh World Cup Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Determine tournament window
        id: window
        run: |
          node -e "
          const fs = require('fs');
          const src = fs.readFileSync('src/data/worldCupSnapshot.ts', 'utf8');
          const startMatch = src.match(/\"startDate\":\s*\"([0-9-]+)\"/);
          const endMatch = src.match(/\"endDate\":\s*\"([0-9-]+)\"/);
          const DAY = 24 * 60 * 60 * 1000;
          const now = new Date();
          // Arm two days before kickoff (pre-tournament friendlies, seeding) and
          // stay armed three days past the final to catch late corrections, then
          // go dormant until a future snapshot moves the dates forward.
          const PRE_ROLL_DAYS = 2;
          const POST_ROLL_DAYS = 3;
          let active = true;
          let reason = 'snapshot carried no start/end dates, defaulting to active';
          if (startMatch && endMatch) {
            const start = new Date(startMatch[1] + 'T00:00:00Z').getTime() - PRE_ROLL_DAYS * DAY;
            const end = new Date(endMatch[1] + 'T23:59:59Z').getTime() + POST_ROLL_DAYS * DAY;
            active = now.getTime() >= start && now.getTime() <= end;
            reason = active
              ? 'within tournament window ' + startMatch[1] + ' to ' + endMatch[1]
              : 'outside tournament window ' + startMatch[1] + ' to ' + endMatch[1];
          }
          fs.appendFileSync(process.env.GITHUB_OUTPUT, 'active=' + active + '\n');
          console.log('Tournament window active:', active, '-', reason);
          "

      - name: Install dependencies
        if: steps.window.outputs.active == 'true'
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh World Cup snapshot
        if: steps.window.outputs.active == 'true'
        run: npm run update:world-cup
        env:
          NODE_ENV: production

      - name: Verify refresh freshness
        if: steps.window.outputs.active == 'true'
        run: npx tsx scripts/verifyDataRefresh.ts world-cup

      - name: Verify World Cup snapshot quality
        id: verify_quality
        if: steps.window.outputs.active == 'true'
        run: |
          node -e "
          const fs = require('fs');

          const SNAPSHOT_PATH = 'src/data/worldCupSnapshot.ts';

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const worldCupSnapshot: WorldCupSnapshot = (\{[\s\S]*\});\s*$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on World Cup snapshot body: ' + String(err));
            process.exit(1);
          }

          const tournament = snapshot.tournament || null;
          const groups = Array.isArray(snapshot.groups) ? snapshot.groups.length : 0;
          const teams = Array.isArray(snapshot.teamOptions) ? snapshot.teamOptions.length : 0;
          const upcoming = Array.isArray(snapshot.upcomingFixtures) ? snapshot.upcomingFixtures.length : 0;
          const recent = Array.isArray(snapshot.recentFixtures) ? snapshot.recentFixtures.length : 0;

          console.log('Tournament:', tournament && tournament.name);
          console.log('Phase:', tournament && tournament.phase);
          console.log('Groups:', groups, 'Teams:', teams, 'Upcoming:', upcoming, 'Recent:', recent);

          // The tournament block must always survive. Empty groups/fixtures are
          // legitimate before kickoff, so they are reported but never fail the run.
          if (!tournament || !tournament.name) {
            console.error('::error::World Cup snapshot has no tournament block.');
            process.exit(1);
          }

          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            'phase=' + ((tournament && tournament.phase) || '') + '\n' +
              'groups=' + groups + '\n' +
              'teams=' + teams + '\n' +
              'fixtures=' + (upcoming + recent) + '\n',
            { flag: 'a' }
          );
          "

      - name: Check for snapshot changes
        id: check_changes
        if: steps.window.outputs.active == 'true'
        run: |
          if [ -z "$(git status --porcelain -- src/data/worldCupSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/worldCupSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/worldCupSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh World Cup snapshot [automated] [skip ci]" \
            src/data/worldCupSnapshot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create job summary
        if: always()
        run: |
          echo "## World Cup Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.window.outputs.active }}" != "true" ]; then
            echo "Outside the tournament window, so the refresh was skipped. The schedule re-arms when the committed snapshot's start and end dates move forward." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${{ steps.verify_quality.outputs.teams }}" ]; then
            echo "**Phase:** ${{ steps.verify_quality.outputs.phase }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Groups:** ${{ steps.verify_quality.outputs.groups }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Teams:** ${{ steps.verify_quality.outputs.teams }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Fixtures:** ${{ steps.verify_quality.outputs.fixtures }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "World Cup snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "World Cup snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `World Cup refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh World Cup Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- ESPN soccer API outage or timeout`,
              `- Quality gate could not parse the snapshot`,
              `- Git push rejected after 5 retries`,
              ``,
              `The refresh keeps the previous snapshot when ESPN is unreachable, so a transient outage will not wipe the data.`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'world-cup-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['world-cup-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'world-cup-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
