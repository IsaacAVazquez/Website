name: Refresh NFL Snapshot

on:
  # Weekly after Monday Night Football during the regular season and playoffs.
  # Manual dispatch covers draft/off-season refreshes when NFLverse data moves.
  schedule:
    - cron: "35 10 * 1-2,9-12 2"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-nfl
  cancel-in-progress: false

jobs:
  refresh-nfl:
    name: Refresh NFL Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh NFL snapshot
        run: npm run update:nfl
        env:
          NODE_ENV: production

      - name: Verify NFL snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');

          const SNAPSHOT_PATH = 'src/data/nflSnapshot.ts';
          const MIN_TEAMS = 30;
          const MIN_TEAM_SNAPSHOTS = 28;
          const MIN_LEADERS = 5;

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const nflSnapshot: NFLSnapshot = (\{[\s\S]*\});\s*$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on NFL snapshot body: ' + String(err));
            process.exit(1);
          }

          const teams = Array.isArray(snapshot.teams) ? snapshot.teams.length : 0;
          const teamOptions = Array.isArray(snapshot.teamOptions) ? snapshot.teamOptions.length : 0;
          const recent = Array.isArray(snapshot.recentFixtures) ? snapshot.recentFixtures.length : 0;
          const upcoming = Array.isArray(snapshot.upcomingFixtures) ? snapshot.upcomingFixtures.length : 0;
          const teamSnapshots = snapshot.teamSnapshots ? Object.keys(snapshot.teamSnapshots).length : 0;
          const passing = Array.isArray(snapshot.leaders?.passing) ? snapshot.leaders.passing.length : 0;
          const rushing = Array.isArray(snapshot.leaders?.rushing) ? snapshot.leaders.rushing.length : 0;
          const receiving = Array.isArray(snapshot.leaders?.receiving) ? snapshot.leaders.receiving.length : 0;

          console.log('Season:', snapshot.season);
          console.log('Week:', snapshot.week);
          console.log('Teams:', teams);
          console.log('Team options:', teamOptions);
          console.log('Recent fixtures:', recent);
          console.log('Upcoming fixtures:', upcoming);
          console.log('Team snapshots:', teamSnapshots);
          console.log('Passing leaders:', passing);
          console.log('Rushing leaders:', rushing);
          console.log('Receiving leaders:', receiving);

          if (teams < MIN_TEAMS || teamOptions < MIN_TEAMS) {
            console.error('::error::Refusing to commit a degraded NFL snapshot. Expected near-complete teams.');
            process.exit(1);
          }

          if (teamSnapshots < MIN_TEAM_SNAPSHOTS) {
            console.error('::error::NFL team snapshots look incomplete: ' + teamSnapshots + '.');
            process.exit(1);
          }

          if (recent + upcoming < 1) {
            console.error('::error::NFL snapshot has no recent or upcoming fixtures.');
            process.exit(1);
          }

          if (passing < MIN_LEADERS || rushing < MIN_LEADERS || receiving < MIN_LEADERS) {
            console.error('::error::NFL leaderboards look incomplete. PASS=' + passing + ', RUSH=' + rushing + ', REC=' + receiving + '.');
            process.exit(1);
          }

          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            'teams=' + teams + '\n' +
              'team_options=' + teamOptions + '\n' +
              'recent=' + recent + '\n' +
              'upcoming=' + upcoming + '\n' +
              'team_snapshots=' + teamSnapshots + '\n' +
              'passing=' + passing + '\n' +
              'rushing=' + rushing + '\n' +
              'receiving=' + receiving + '\n',
            { flag: 'a' }
          );
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/nflSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/nflSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/nflSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/nflSnapshot.ts
          git commit -m "chore: refresh nfl snapshot [automated] [skip ci]"
          # Retry on push rejection. Main can move during the refresh, so
          # rebase the single snapshot commit onto the latest origin/main and
          # try again. Bail on a real conflict.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt $attempt rejected. Rebasing onto latest origin/main..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict. Failing the run."
              exit 1
            fi
            sleep $((attempt * 3))
          done
          echo "Push failed after 5 attempts."
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create job summary
        if: always()
        run: |
          echo "## NFL Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Tuesdays at 10:35 UTC, September through February" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.verify_quality.outputs.teams }}" ]; then
            echo "**Teams:** ${{ steps.verify_quality.outputs.teams }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Recent fixtures:** ${{ steps.verify_quality.outputs.recent }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Upcoming fixtures:** ${{ steps.verify_quality.outputs.upcoming }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Team snapshots:** ${{ steps.verify_quality.outputs.team_snapshots }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "NFL snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "NFL snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `NFL refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh NFL Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- NFLverse or raw GitHub data source outage`,
              `- Quality gate caught a degraded snapshot`,
              `- Git push rejected after 5 retries`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nfl-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['nfl-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nfl-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
