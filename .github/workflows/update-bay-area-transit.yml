name: Refresh Bay Area Transit Snapshot

on:
  # Every six hours. Lines, stations, and alerts are stable; departures are a
  # point-in-time snapshot, so a few refreshes a day keeps the board useful
  # without committing noisy minute-to-minute churn. BART's public API needs no
  # token.
  schedule:
    # Staggered off :20 so it doesn't race the hourly earthquake and 6h world-cup
    # refreshes (which also push to main) over the same minute.
    - cron: "35 */6 * * *"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-bay-area-transit
  cancel-in-progress: false

jobs:
  refresh-bay-area-transit:
    name: Refresh Bay Area Transit Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh transit snapshot
        run: npm run update:bay-area-transit
        env:
          NODE_ENV: production

      - name: Verify transit snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');

          const SNAPSHOT_PATH = 'src/data/bayAreaTransitSnapshot.ts';
          const MIN_LINES = 3;
          const MIN_STATIONS = 10;

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const bayAreaTransitSnapshot: TransitSnapshot = (\{[\s\S]*\});\s*$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on transit snapshot body: ' + String(err));
            process.exit(1);
          }

          const summary = snapshot.summary ?? {};
          const lines = Array.isArray(summary.lines) ? summary.lines.length : 0;
          const stations = Array.isArray(summary.stations) ? summary.stations.length : 0;
          const trains = (summary.heroStats && summary.heroStats.trainsTracked) || 0;

          console.log('Lines:', lines);
          console.log('Stations:', stations);
          console.log('Trains tracked:', trains);

          if (lines < MIN_LINES) {
            console.error('::error::Refusing to commit a degraded transit snapshot. Expected at least ' + MIN_LINES + ' lines, got ' + lines + '.');
            process.exit(1);
          }

          if (stations < MIN_STATIONS) {
            console.error('::error::Refusing to commit a degraded transit snapshot. Expected at least ' + MIN_STATIONS + ' stations, got ' + stations + '.');
            process.exit(1);
          }

          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            'lines=' + lines + '\n' +
              'stations=' + stations + '\n' +
              'trains=' + trains + '\n',
            { flag: 'a' }
          );
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/bayAreaTransitSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/bayAreaTransitSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/bayAreaTransitSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh bay area transit snapshot [automated] [skip ci]" \
            src/data/bayAreaTransitSnapshot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Snapshot commits carry [skip ci], so the live site otherwise only picks
      # up the refresh on the daily cron-job.org build hook. This deploys
      # promptly when the snapshot actually changed, and no-ops until the
      # NETLIFY_BUILD_HOOK secret is configured.
      - name: Trigger Netlify deploy
        if: steps.check_changes.outputs.changed == 'true'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "NETLIFY_BUILD_HOOK secret not configured; skipping deploy trigger."
            exit 0
          fi
          curl -fsS -X POST -d '{}' "$NETLIFY_BUILD_HOOK" \
            && echo "Netlify build hook triggered." \
            || echo "::warning::Netlify build hook request failed; the daily scheduled rebuild will pick up the snapshot."

      - name: Create job summary
        if: always()
        run: |
          echo "## Bay Area Transit Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Every 6 hours" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.verify_quality.outputs.stations }}" ]; then
            echo "**Lines:** ${{ steps.verify_quality.outputs.lines }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Stations:** ${{ steps.verify_quality.outputs.stations }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Trains tracked:** ${{ steps.verify_quality.outputs.trains }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "Transit snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Transit snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Bay Area transit refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh Bay Area Transit Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- BART API outage or timeout`,
              `- Quality gate caught a degraded snapshot`,
              `- Git push rejected after 5 retries`,
              ``,
              `The refresh keeps the previous snapshot when BART is unreachable, so a transient outage will not wipe the dashboard.`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'transit-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['transit-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'transit-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
