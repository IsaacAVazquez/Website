name: Refresh GitHub Trending Snapshot

on:
  schedule:
    - cron: "45 7 * * *"
  workflow_dispatch:

concurrency:
  group: refresh-github-trending
  cancel-in-progress: false

jobs:
  refresh-github-trending:
    name: Refresh GitHub Trending Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh GitHub trending snapshot
        run: npm run update:github-trending
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: production

      - name: Verify snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const SNAPSHOT_PATH = 'src/data/githubTrendingSnapshot.ts';
          const MIN_REPOS = 50; // 14 segments x ~10 repos = ~140; 50 is a safe floor.

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const githubTrendingSnapshot: GitHubTrendingSnapshot = (\{[\s\S]*\});\s*\$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on snapshot body: ' + String(err));
            process.exit(1);
          }

          const repoCount = Number(snapshot && snapshot.totals && snapshot.totals.repositories);
          console.log('Snapshot repository count:', repoCount);

          if (!Number.isFinite(repoCount) || repoCount < MIN_REPOS) {
            console.error('::error::Refusing to commit a degraded snapshot. Got ' + repoCount + ' repos; expected at least ' + MIN_REPOS + '.');
            process.exit(1);
          }

          fs.writeFileSync(process.env.GITHUB_OUTPUT, 'repo_count=' + repoCount + '\n', { flag: 'a' });
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/githubTrendingSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/githubTrendingSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/githubTrendingSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/githubTrendingSnapshot.ts
          git commit -m "chore: refresh github trending snapshot [automated] [skip ci]"
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              exit 0
            fi
            echo "Push attempt $attempt rejected. Rebasing onto latest origin/main..."
            git fetch origin main
            if ! git rebase origin/main; then
              git rebase --abort
              echo "Rebase conflict. Failing the run."
              exit 1
            fi
            sleep $((attempt * 3))
          done
          echo "Push failed after 5 attempts."
          exit 1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create job summary
        if: always()
        run: |
          echo "## GitHub Trending Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Daily at 07:45 UTC" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "GitHub trending snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "GitHub trending snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi
