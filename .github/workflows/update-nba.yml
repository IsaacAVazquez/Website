name: Refresh NBA Snapshot

on:
  # Every four hours during the NBA season and playoffs. October starts mid-month
  # to avoid failing before ESPN has regular-season leaders populated.
  schedule:
    - cron: "20 */4 15-31 10 *"
    - cron: "20 */4 * 1-6,11-12 *"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-nba
  cancel-in-progress: false

jobs:
  refresh-nba:
    name: Refresh NBA Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh NBA snapshot
        run: npm run update:nba
        env:
          NODE_ENV: production

      - name: Verify refresh freshness
        run: npx tsx scripts/verifyDataRefresh.ts nba

      - name: Verify NBA snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');

          const SNAPSHOT_PATH = 'src/data/nbaSnapshot.ts';
          const MIN_CONFERENCE_TEAMS = 14;
          const MIN_TEAMS = 28;
          const MIN_TEAM_SNAPSHOTS = 20;
          const MIN_LEADERS = 5;

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const nbaSnapshot: NbaSnapshot = (\{[\s\S]*\});\s*$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on NBA snapshot body: ' + String(err));
            process.exit(1);
          }

          const east = Array.isArray(snapshot.teamsByConference?.east)
            ? snapshot.teamsByConference.east.length
            : 0;
          const west = Array.isArray(snapshot.teamsByConference?.west)
            ? snapshot.teamsByConference.west.length
            : 0;
          const teams = Array.isArray(snapshot.teams) ? snapshot.teams.length : 0;
          const scorers = Array.isArray(snapshot.scorers) ? snapshot.scorers.length : 0;
          const rebounders = Array.isArray(snapshot.rebounders) ? snapshot.rebounders.length : 0;
          const assists = Array.isArray(snapshot.assistLeaders) ? snapshot.assistLeaders.length : 0;
          const recent = Array.isArray(snapshot.recentFixtures) ? snapshot.recentFixtures.length : 0;
          const upcoming = Array.isArray(snapshot.upcomingFixtures) ? snapshot.upcomingFixtures.length : 0;
          const teamSnapshots = snapshot.teamSnapshots ? Object.keys(snapshot.teamSnapshots).length : 0;

          console.log('Season:', snapshot.season);
          console.log('East teams:', east);
          console.log('West teams:', west);
          console.log('Team options:', teams);
          console.log('Recent fixtures:', recent);
          console.log('Upcoming fixtures:', upcoming);
          console.log('Team snapshots:', teamSnapshots);
          console.log('Scorers:', scorers);
          console.log('Rebounders:', rebounders);
          console.log('Assist leaders:', assists);

          if (east < MIN_CONFERENCE_TEAMS || west < MIN_CONFERENCE_TEAMS || teams < MIN_TEAMS) {
            console.error('::error::Refusing to commit a degraded NBA snapshot. Expected near-complete conferences and teams.');
            process.exit(1);
          }

          if (teamSnapshots < MIN_TEAM_SNAPSHOTS) {
            console.error('::error::NBA team snapshots look incomplete: ' + teamSnapshots + '.');
            process.exit(1);
          }

          // Off-season / transient-blip signal (informational only). Once the
          // Finals end, the +/-7 day scoreboard window is legitimately empty,
          // and it can blip empty for a single mid-season run. The builder
          // (updateNbaSnapshot.ts -> preservePriorFixtures) carries the
          // committed snapshot's fixtures forward in that case, so fixtures
          // never regress to zero and a standings/leaders/season refresh still
          // commits on its own. This flag no longer gates the commit — it only
          // annotates the run summary (issue #232 follow-up). A real outage that
          // also empties standings or leaders still hard-fails via the gates
          // above and below.
          let offseason = 'false';
          if (recent + upcoming < 1) {
            offseason = 'true';
            console.log('::warning::NBA scoreboard window is empty (off-season or a transient scoreboard blip). Standings and leaders were still verified; the builder carries prior fixtures forward.');
          }

          if (scorers < MIN_LEADERS || rebounders < MIN_LEADERS || assists < MIN_LEADERS) {
            console.error('::error::NBA leaderboards look incomplete. PTS=' + scorers + ', REB=' + rebounders + ', AST=' + assists + '.');
            process.exit(1);
          }

          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            'east=' + east + '\n' +
              'west=' + west + '\n' +
              'teams=' + teams + '\n' +
              'recent=' + recent + '\n' +
              'upcoming=' + upcoming + '\n' +
              'team_snapshots=' + teamSnapshots + '\n' +
              'scorers=' + scorers + '\n' +
              'rebounders=' + rebounders + '\n' +
              'assists=' + assists + '\n' +
              'offseason=' + offseason + '\n',
            { flag: 'a' }
          );
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/nbaSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/nbaSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/nbaSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh nba snapshot [automated] [skip ci]" \
            src/data/nbaSnapshot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create job summary
        if: always()
        run: |
          echo "## NBA Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Daily at 10:20 UTC, mid-October through June" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.verify_quality.outputs.teams }}" ]; then
            echo "**East teams:** ${{ steps.verify_quality.outputs.east }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**West teams:** ${{ steps.verify_quality.outputs.west }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Recent fixtures:** ${{ steps.verify_quality.outputs.recent }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Upcoming fixtures:** ${{ steps.verify_quality.outputs.upcoming }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Team snapshots:** ${{ steps.verify_quality.outputs.team_snapshots }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "NBA snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          elif [ "${{ steps.verify_quality.outputs.offseason }}" = "true" ]; then
            echo "NBA scoreboard window is empty (off-season); fixtures carried forward and nothing else changed, so no commit." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "NBA snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `NBA refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh NBA Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- ESPN NBA endpoint outage or timeout`,
              `- Quality gate caught a degraded snapshot`,
              `- Git push rejected after 5 retries`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nba-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['nba-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'nba-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
