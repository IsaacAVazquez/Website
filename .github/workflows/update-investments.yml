name: Refresh Investments Snapshots

on:
  # Weekdays at 22:15 UTC, after the US market close. Run manually anytime via
  # workflow_dispatch.
  schedule:
    - cron: "15 22 * * 1-5"
  workflow_dispatch:

# Cancel stacked runs (e.g. dispatch fired while a scheduled run is queued)
# so a single retry doesn't burn double the minutes.
concurrency:
  group: refresh-investments
  cancel-in-progress: false

jobs:
  refresh-investments:
    name: Refresh Investments Data
    runs-on: ubuntu-latest
    # The 22-minute fetch budget starts after setup; leave room for checkout,
    # dependency restore, snapshot build, verification, cache save, and push.
    timeout-minutes: 35

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Cache the entire venv so we skip both the python -m venv and the
      # pip install on subsequent runs. Keyed on the python version + the
      # pinned defeatbeta-api version so a bump invalidates correctly.
      - name: Cache investments venv
        id: venv-cache
        uses: actions/cache@v6
        with:
          path: .venv
          key: investments-venv-${{ runner.os }}-py3.11-defeatbeta-api-0.0.47

      - name: Create venv and install fetch dependency
        if: steps.venv-cache.outputs.cache-hit != 'true'
        run: |
          python -m venv .venv
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install defeatbeta-api==0.0.47

      # defeatbeta-api stores its DuckDB/parquet cache at /tmp/defeatbeta. The
      # very first ticker fetch on a fresh runner downloads the upstream
      # dataset, which has been observed at ~15+ min for a single symbol —
      # blowing past the 25 min job timeout before any other symbol runs.
      # Persisting that directory between runs reduces the warm-call cost to
      # seconds. Key on the ISO week so the cache rolls over weekly even if
      # defeatbeta-api's internal "Update time" hasn't advanced; restore-keys
      # fall back to the most recent cache so we never start cold.
      #
      # Restore + save are split so the save step can run with `if: always()`.
      # The combined `actions/cache@v5` only saves on job success, which would
      # leave the first run (and any subsequent timed-out run) with no cache
      # to restore from on the next attempt — a permanent timeout loop.
      - name: Compute defeatbeta cache key
        id: dfb-key
        run: echo "week=$(date -u +'%G-%V')" >> "$GITHUB_OUTPUT"

      - name: Restore defeatbeta data cache
        id: dfb-cache
        uses: actions/cache/restore@v6
        with:
          path: /tmp/defeatbeta
          key: defeatbeta-data-${{ runner.os }}-${{ steps.dfb-key.outputs.week }}
          restore-keys: |
            defeatbeta-data-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Test investments fetch watchdogs
        run: .venv/bin/python3 -m unittest scripts.tests.test_fetch_investments_data

      - name: Refresh investments snapshots
        run: npm run update:investments
        env:
          NODE_ENV: production
          # Bound first attempts tightly enough that one or two new provider
          # hangs cannot consume the run before scheduler state is committed.
          PER_SYMBOL_TIMEOUT_SECONDS: "180"
          # A symbol that already failed gets a shorter watchdog on later runs
          # so one permanent provider hang cannot starve the rotation.
          RETRY_FAILED_SYMBOL_TIMEOUT_SECONDS: "60"
          # After two long first-attempt timeouts, all remaining symbols use
          # the retry cap for this run even if their ledger is not committed.
          MAX_LONG_TIMEOUTS_PER_RUN: "2"
          # Global soft cap: stop dispatching new symbols ~3 min before the
          # 25 min hard timeout so the build/verify steps still get to run
          # and the partial cache gets saved cleanly.
          GLOBAL_BUDGET_SECONDS: "1320"
          # A non-empty array is not enough. Reject any provider response whose
          # last market date is more than a week old.
          MAX_PRICE_AGE_DAYS: "7"

      - name: Verify refresh freshness
        run: npx tsx scripts/verifyDataRefresh.ts investments

      # Save the (possibly partially warmed) cache even on timeout/cancellation
      # so the next run can resume from whatever the previous run got through.
      # Only re-save when the primary key didn't already hit, otherwise we'd
      # churn the cache on every run.
      - name: Save defeatbeta data cache
        if: always() && steps.dfb-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v6
        with:
          path: /tmp/defeatbeta
          key: defeatbeta-data-${{ runner.os }}-${{ steps.dfb-key.outputs.week }}

      - name: Verify investments snapshot freshness and quality
        id: verify_freshness
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const DATA_DIR = 'public/data/investments';
          const index = JSON.parse(fs.readFileSync(path.join(DATA_DIR, 'index.json'), 'utf8'));
          const lastUpdated = new Date(index.lastUpdated);
          const ageHours = (Date.now() - lastUpdated.getTime()) / (1000 * 60 * 60);
          const successCount = Array.isArray(index.symbols) ? index.symbols.length : 0;
          const failedCount = Array.isArray(index.failed) ? index.failed.length : 0;
          const freshCount = Number.isInteger(index.freshCount)
            ? index.freshCount
            : (Array.isArray(index.entries) ? index.entries.filter((entry) => !entry.stale).length : 0);
          const staleCount = Number.isInteger(index.staleCount)
            ? index.staleCount
            : (Array.isArray(index.entries) ? index.entries.filter((entry) => entry.stale).length : 0);
          const partialCount = Number.isInteger(index.partialCount)
            ? index.partialCount
            : (Array.isArray(index.entries) ? index.entries.filter((entry) => entry.partial).length : 0);
          console.log('Index lastUpdated:', index.lastUpdated);
          console.log('Age (hours):', ageHours.toFixed(2));
          console.log('Symbols available:', successCount, 'fresh:', freshCount, 'stale:', staleCount, 'unavailable:', failedCount);

          if (ageHours > 2) {
            console.error('::error::index.lastUpdated is older than 2 hours after a refresh run. The Python fetch likely failed silently.');
            process.exit(1);
          }
          if (successCount === 0) {
            console.error('::error::index.symbols is empty. The Python fetch produced no successful symbols.');
            process.exit(1);
          }
          if (freshCount === 0) {
            console.error('::error::No symbols refreshed successfully. Refusing to report a stale-only recovery as a successful refresh.');
            process.exit(1);
          }
          if (freshCount + staleCount !== successCount) {
            console.error('::error::Fresh/stale counts do not reconcile with the available symbol count.');
            process.exit(1);
          }
          const staleRatio = staleCount / successCount;
          if (staleRatio > 0.8) {
            console.warn('::warning::' + (staleRatio * 100).toFixed(1) + '% of symbols are using earlier snapshots.');
          }
          if (staleRatio > 0.9) {
            console.error('::error::More than 90% of the research universe is using earlier snapshots.');
            process.exit(1);
          }
          const partialRatio = partialCount / successCount;
          if (partialRatio > 0.25) {
            console.warn('::warning::' + (partialRatio * 100).toFixed(1) + '% of symbols retained one or more earlier sections.');
          }
          if (partialRatio > 0.5) {
            console.error('::error::More than 50% of the research universe retained earlier sections; likely a systemic provider outage.');
            process.exit(1);
          }

          // Quality check: when defeatbeta-api silently returns empty data
          // for every ticker (the documented failure mode after a hang or
          // upstream outage), every symbol still ends up in index.symbols
          // but the resulting snapshots are mostly empty. Catch that by
          // counting symbols whose final snapshot has real price history.
          const QUALITY_THRESHOLD = 0.8;
          const MAX_PRICE_AGE_DAYS = 7;
          let withPrice = 0;
          const missingPrice = [];
          const staleEntrySymbols = new Set(
            Array.isArray(index.entries)
              ? index.entries.filter((entry) => entry.stale === true).map((entry) => entry.symbol)
              : []
          );
          const delayedFreshSymbols = [];
          for (const symbol of index.symbols) {
            const snapshotPath = path.join(DATA_DIR, symbol, 'snapshot.json');
            try {
              const snapshot = JSON.parse(fs.readFileSync(snapshotPath, 'utf8'));
              if (snapshot && snapshot.capabilities && snapshot.capabilities.price === true) {
                withPrice += 1;
                const priceAsOf = snapshot.freshness && snapshot.freshness.sections
                  ? snapshot.freshness.sections.price
                  : null;
                const ageDays = priceAsOf
                  ? Math.floor((lastUpdated.getTime() - new Date(priceAsOf + 'T00:00:00Z').getTime()) / 86400000)
                  : Number.POSITIVE_INFINITY;
                if (!staleEntrySymbols.has(symbol) && (ageDays < -1 || ageDays > MAX_PRICE_AGE_DAYS)) {
                  delayedFreshSymbols.push(symbol + ':' + (priceAsOf || 'missing'));
                }
              } else {
                missingPrice.push(symbol);
              }
            } catch (err) {
              missingPrice.push(symbol);
            }
          }
          const ratio = withPrice / successCount;
          console.log('Symbols with valid price history:', withPrice, '/', successCount, '(' + (ratio * 100).toFixed(1) + '%)');
          if (missingPrice.length > 0) {
            console.log('Symbols missing price (first 20):', missingPrice.slice(0, 20).join(', '));
          }
          if (ratio < QUALITY_THRESHOLD) {
            console.error('::error::Only ' + (ratio * 100).toFixed(1) + '% of symbols have valid price history (threshold: ' + (QUALITY_THRESHOLD * 100) + '%). Likely a silent upstream failure — refusing to commit a degraded snapshot.');
            process.exit(1);
          }
          if (delayedFreshSymbols.length > 0) {
            console.error('::error::Symbols marked fresh have delayed price history: ' + delayedFreshSymbols.slice(0, 20).join(', '));
            process.exit(1);
          }

          fs.writeFileSync(process.env.GITHUB_OUTPUT, 'success_count=' + successCount + '\nfresh_count=' + freshCount + '\nstale_count=' + staleCount + '\nfailed_count=' + failedCount + '\nwith_price=' + withPrice + '\n', { flag: 'a' });
          "

      - name: Check for investments data changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- public/data/investments)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in investments data"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in investments data"
          fi

      - name: Commit and push refreshed investments data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh investments snapshots [automated] [skip ci]" \
            public/data/investments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Investments refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh Investments Snapshots** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- \`defeatbeta-api\` upstream data outage or pip install failure`,
              `- Post-fetch sanity check caught a stale \`index.lastUpdated\``,
              `- Git push blocked by branch protection`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'investments-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['investments-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'investments-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }

      - name: Create job summary
        if: always()
        run: |
          echo "## Investments Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Weekdays at 22:15 UTC" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.verify_freshness.outputs.success_count }}" ]; then
            echo "**Symbols available:** ${{ steps.verify_freshness.outputs.success_count }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Fresh this run:** ${{ steps.verify_freshness.outputs.fresh_count }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Using earlier snapshots:** ${{ steps.verify_freshness.outputs.stale_count }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Unavailable:** ${{ steps.verify_freshness.outputs.failed_count }}" >> "$GITHUB_STEP_SUMMARY"
            if [ -n "${{ steps.verify_freshness.outputs.with_price }}" ]; then
              echo "**With valid price history:** ${{ steps.verify_freshness.outputs.with_price }}" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          # Branch on job status FIRST. The previous version fell into the
          # "already up to date" else whenever check_changes hadn't run (e.g.
          # on cancellation or earlier-step failure), which made timed-out
          # runs look like clean no-op runs.
          case "${{ job.status }}" in
            success)
              if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
                echo "✅ Investments snapshots changed and were committed." >> "$GITHUB_STEP_SUMMARY"
              else
                echo "ℹ️ Investments snapshots were already up to date." >> "$GITHUB_STEP_SUMMARY"
              fi
              ;;
            cancelled)
              echo "⚠️ Run was cancelled before completion (commonly the 25-minute job timeout). Snapshots were **not** verified or committed." >> "$GITHUB_STEP_SUMMARY"
              ;;
            failure)
              echo "❌ Run failed before commit. Check the failed step for details." >> "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              echo "ℹ️ Run ended with status \`${{ job.status }}\`." >> "$GITHUB_STEP_SUMMARY"
              ;;
          esac
