name: Refresh Investments Snapshots

on:
  schedule:
    - cron: "15 22 * * 1-5"
  workflow_dispatch:

jobs:
  refresh-investments:
    name: Refresh Investments Data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install dependencies
        run: npm ci

      - name: Install investments fetch dependency
        run: |
          .venv/bin/pip install --upgrade pip
          .venv/bin/pip install defeatbeta-api

      - name: Refresh investments snapshots
        run: npm run update:investments
        env:
          NODE_ENV: production

      - name: Check for investments data changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- public/data/investments)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in public/data/investments"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in public/data/investments"
          fi

      - name: Commit and push refreshed investments data
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/data/investments
          git commit -m "chore: refresh investments snapshots [automated]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create job summary
        if: always()
        run: |
          echo "## Investments Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Weekdays at 22:15 UTC" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "✅ Investments snapshots changed and were committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ Investments snapshots were already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi
