name: Refresh Earthquake Snapshot

on:
  # Hourly pass. USGS feeds update every minute, but an hourly snapshot keeps the
  # dashboard current without spending runner minutes constantly. The USGS public
  # GeoJSON feeds need no token.
  schedule:
    - cron: "20 * * * *"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-earthquake
  cancel-in-progress: false

jobs:
  refresh-earthquake:
    name: Refresh Earthquake Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh earthquake snapshot
        run: npm run update:earthquake
        env:
          NODE_ENV: production

      - name: Verify earthquake snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');

          const SNAPSHOT_PATH = 'src/data/earthquakeSnapshot.ts';

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const earthquakeSnapshot: EarthquakeSnapshot = (\{[\s\S]*\});\s*$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on earthquake snapshot body: ' + String(err));
            process.exit(1);
          }

          const summary = snapshot.summary ?? {};
          const recent = Array.isArray(summary.recent) ? summary.recent.length : 0;
          const significant = Array.isArray(summary.significant) ? summary.significant.length : 0;
          const regions = Array.isArray(summary.regions) ? summary.regions.length : 0;
          const total7d = summary.heroStats ? summary.heroStats.total7d : 0;

          console.log('Recent (24h):', recent);
          console.log('Significant (30d):', significant);
          console.log('Regions:', regions);
          console.log('Total 7d:', total7d);
          console.log('Feed updated:', summary.feedUpdated);

          if (recent === 0 && significant === 0 && regions === 0) {
            console.error('::error::Refusing to commit a degraded earthquake snapshot: every section is empty.');
            process.exit(1);
          }

          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            'recent=' + recent + '\n' +
              'significant=' + significant + '\n' +
              'total7d=' + total7d + '\n',
            { flag: 'a' }
          );
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/earthquakeSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/earthquakeSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/earthquakeSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh earthquake snapshot [automated] [skip ci]" \
            src/data/earthquakeSnapshot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create job summary
        if: always()
        run: |
          echo "## Earthquake Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Hourly at :20 UTC" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ steps.verify_quality.outputs.recent }}" ]; then
            echo "**Recent (24h):** ${{ steps.verify_quality.outputs.recent }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Significant (30d):** ${{ steps.verify_quality.outputs.significant }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Total 7d:** ${{ steps.verify_quality.outputs.total7d }}" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "Earthquake snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Earthquake snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Earthquake refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh Earthquake Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- USGS feed outage or timeout`,
              `- Quality gate caught a degraded snapshot`,
              `- Git push rejected after 5 retries`,
              ``,
              `The refresh keeps the previous snapshot when USGS is unreachable, so a transient outage will not wipe the dashboard.`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'earthquake-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['earthquake-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'earthquake-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
