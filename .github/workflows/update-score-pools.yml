name: Refresh Score Pools Snapshot

on:
  # Four passes a day keeps odds history granular enough to read line
  # movement without burning The Odds API quota. Results and standings ride
  # along on the same runs.
  schedule:
    - cron: "23 */6 * * *"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: refresh-score-pools
  cancel-in-progress: false

jobs:
  refresh-score-pools:
    name: Refresh Score Pools Snapshot
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Refresh score-pools snapshot
        run: npm run update:score-pools
        env:
          NODE_ENV: production
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}

      - name: Verify score-pools snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');

          const SNAPSHOT_PATH = 'src/data/scorePoolsSnapshot.ts';

          if (!fs.existsSync(SNAPSHOT_PATH)) {
            console.error('::error::Snapshot file is missing at ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          const source = fs.readFileSync(SNAPSHOT_PATH, 'utf8');
          const match = source.match(
            /export const scorePoolsSnapshot: ScorePoolsSnapshot = (\{[\s\S]*\});\s*$/
          );
          if (!match) {
            console.error('::error::Could not parse snapshot export from ' + SNAPSHOT_PATH);
            process.exit(1);
          }

          let snapshot;
          try {
            snapshot = JSON.parse(match[1]);
          } catch (err) {
            console.error('::error::JSON.parse failed on score-pools snapshot body: ' + String(err));
            process.exit(1);
          }

          const leagues = Array.isArray(snapshot.leagues) ? snapshot.leagues : [];
          const fixtures = leagues.reduce((sum, l) => sum + (l.fixtures?.length ?? 0), 0);
          const odds = leagues.reduce(
            (sum, l) => sum + (l.fixtures ?? []).reduce((s, f) => s + (f.odds?.length ?? 0), 0),
            0
          );

          console.log('Leagues:', leagues.length);
          console.log('Fixtures:', fixtures);
          console.log('Odds snapshots:', odds);
          console.log('Generated at:', snapshot.generatedAt);

          if (leagues.length === 0) {
            console.error('::error::Refusing to commit a score-pools snapshot with no leagues.');
            process.exit(1);
          }

          fs.writeFileSync(
            process.env.GITHUB_OUTPUT,
            'leagues=' + leagues.length + '\n' +
              'fixtures=' + fixtures + '\n' +
              'odds=' + odds + '\n',
            { flag: 'a' }
          );
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if [ -z "$(git status --porcelain -- src/data/scorePoolsSnapshot.ts)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected in src/data/scorePoolsSnapshot.ts"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected in src/data/scorePoolsSnapshot.ts"
          fi

      - name: Commit and push refreshed snapshot
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: refresh score pools snapshot [automated] [skip ci]" \
            src/data/scorePoolsSnapshot.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Snapshot commits carry [skip ci]; deploy promptly when the odds moved.
      - name: Trigger Netlify deploy
        if: steps.check_changes.outputs.changed == 'true'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "NETLIFY_BUILD_HOOK secret not configured; skipping deploy trigger."
            exit 0
          fi
          curl -fsS -X POST -d '{}' "$NETLIFY_BUILD_HOOK" \
            && echo "Netlify build hook triggered." \
            || echo "::warning::Netlify build hook request failed; the daily scheduled rebuild will pick up the snapshot."

      - name: Create job summary
        if: always()
        env:
          LEAGUES: ${{ steps.verify_quality.outputs.leagues }}
          FIXTURES: ${{ steps.verify_quality.outputs.fixtures }}
          ODDS: ${{ steps.verify_quality.outputs.odds }}
        run: |
          echo "## Score Pools Snapshot Refresh" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "**Schedule:** Every 6 hours" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$LEAGUES" ]; then
            echo "**Leagues:** $LEAGUES" >> "$GITHUB_STEP_SUMMARY"
            echo "**Fixtures:** $FIXTURES" >> "$GITHUB_STEP_SUMMARY"
            echo "**Odds snapshots:** $ODDS" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ steps.check_changes.outputs.changed }}" = "true" ]; then
            echo "Score-pools snapshot changed and was committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Score-pools snapshot was already up to date." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Score-pools refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh Score Pools Snapshot** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- The Odds API or API-Football outage, quota exhaustion, or timeout`,
              `- Quality gate caught a degraded snapshot`,
              `- Git push rejected after retries`,
              ``,
              `The refresh keeps the previous snapshot when a provider is unreachable, so a transient outage will not wipe the odds history.`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'score-pools-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['score-pools-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'score-pools-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
