name: Update Fantasy Football Snapshots

on:
  schedule:
    - cron: "0 17 * * 3"
  workflow_dispatch:

# Don't stack a manual dispatch on top of a scheduled run.
concurrency:
  group: update-fantasy
  cancel-in-progress: false

jobs:
  update-fantasy-snapshots:
    name: Update Fantasy Football Snapshots
    runs-on: ubuntu-latest
    # FantasyPros scrape with retries can run long; cap at 30 min.
    timeout-minutes: 30
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --fund=false

      - name: Build fantasy snapshots
        run: npm run update:fantasy
        env:
          NODE_ENV: production

      # Quality gate: a partial scrape (e.g. FantasyPros throttling some
      # positions) can produce a snapshot with mostly empty boards and slip
      # past `git diff` because the file does change. Refuse to commit unless
      # every scoring format has a healthy overall board AND every individual
      # position board (QB/RB/WR/TE/K/DST) clears a conservative floor. The
      # floors sit well below normal counts so they only trip on a genuinely
      # degraded or empty board, not on routine week-to-week churn.
      - name: Verify fantasy snapshot quality
        id: verify_quality
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const MIN_OVERALL = 100;
          const MIN_POSITION = { QB: 20, RB: 40, WR: 40, TE: 20, K: 10, DST: 10 };
          const DATA_DIR = path.join('public', 'data', 'fantasy');
          const formats = ['ppr', 'half_ppr', 'standard'];
          const failures = [];

          for (const format of formats) {
            const filePath = path.join(DATA_DIR, format + '.json');
            try {
              const snapshot = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              const overallCount = Array.isArray(snapshot.overall) ? snapshot.overall.length : 0;
              const positions = snapshot.positions || {};
              const counts = Object.keys(MIN_POSITION)
                .map((pos) => pos + '=' + ((positions[pos] || []).length))
                .join(' ');
              console.log(format + ': overall=' + overallCount + ' ' + counts);

              if (overallCount < MIN_OVERALL) {
                failures.push(format + ' overall has ' + overallCount + ' players (need >= ' + MIN_OVERALL + ')');
              }
              for (const [pos, min] of Object.entries(MIN_POSITION)) {
                const count = Array.isArray(positions[pos]) ? positions[pos].length : 0;
                if (count < min) {
                  failures.push(format + ' ' + pos + ' board has ' + count + ' players (need >= ' + min + ')');
                }
              }
            } catch (err) {
              failures.push(format + ' failed to parse: ' + err.message);
            }
          }

          if (failures.length > 0) {
            console.error('::error::Fantasy snapshot quality gate failed:');
            for (const failure of failures) {
              console.error('::error::  - ' + failure);
            }
            process.exit(1);
          }
          console.log('All scoring formats cleared the overall and per-position floors. Quality gate passed.');
          "

      # ADP is a soft signal layered on top of the consensus boards. Its fetch
      # script never fails the run by design, so check coverage here and warn
      # (never fail) when ADP is missing or matched thinly.
      - name: Check ADP coverage (soft warning)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const MIN_COVERAGE = 0.6;
          const DATA_DIR = path.join('public', 'data', 'fantasy');
          const formats = ['ppr', 'half_ppr', 'standard'];

          for (const format of formats) {
            try {
              const snapshot = JSON.parse(fs.readFileSync(path.join(DATA_DIR, format + '.json'), 'utf8'));
              const overallCount = Array.isArray(snapshot.overall) ? snapshot.overall.length : 0;
              if (!snapshot.adpSource) {
                console.log('::warning::' + format + ' snapshot has no ADP data (adpSource is null). The boards still work; ADP surfaces are hidden.');
                continue;
              }
              const coverage = overallCount > 0 ? snapshot.adpSource.matchedCount / overallCount : 0;
              const pct = Math.round(coverage * 100);
              console.log(format + ': ADP matched ' + snapshot.adpSource.matchedCount + ' players (' + pct + '% of overall), asOf ' + snapshot.adpSource.asOf);
              if (coverage < MIN_COVERAGE) {
                console.log('::warning::' + format + ' ADP coverage is ' + pct + '%, below the ' + (MIN_COVERAGE * 100) + '% comfort floor. Check the matcher or the upstream feed.');
              }
            } catch (err) {
              console.log('::warning::' + format + ' ADP coverage check failed to parse the snapshot: ' + err.message);
            }
          }
          "

      - name: Check for snapshot changes
        id: check_changes
        run: |
          if git diff --quiet -- \
            src/data/fantasyPositionData.generated.ts \
            src/data/fantasyAdpData.generated.ts \
            src/data/fantasySnapshotRevision.generated.ts \
            public/data/fantasy/ppr.json \
            public/data/fantasy/half_ppr.json \
            public/data/fantasy/standard.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No fantasy snapshot changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Fantasy snapshot changes detected."
          fi

      - name: Commit and push snapshot updates
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          bash scripts/ci/commit-and-push-snapshot.sh \
            "chore: update fantasy football snapshots [automated] [skip ci]" \
            src/data/fantasyPositionData.generated.ts \
            src/data/fantasyAdpData.generated.ts \
            src/data/fantasySnapshotRevision.generated.ts \
            public/data/fantasy/ppr.json \
            public/data/fantasy/half_ppr.json \
            public/data/fantasy/standard.json

      # Snapshot commits carry [skip ci], so the live site otherwise only picks
      # up the refresh on the daily cron-job.org build hook. This deploys
      # promptly when the snapshot actually changed, and no-ops until the
      # NETLIFY_BUILD_HOOK secret is configured.
      - name: Trigger Netlify deploy
        if: steps.check_changes.outputs.changed == 'true'
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
        run: |
          if [ -z "$NETLIFY_BUILD_HOOK" ]; then
            echo "NETLIFY_BUILD_HOOK secret not configured; skipping deploy trigger."
            exit 0
          fi
          curl -fsS -X POST -d '{}' "$NETLIFY_BUILD_HOOK" \
            && echo "Netlify build hook triggered." \
            || echo "::warning::Netlify build hook request failed; the daily scheduled rebuild will pick up the snapshot."

      - name: Create job summary
        if: always()
        run: |
          echo "## Fantasy Football Snapshot Update" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Status:** ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.check_changes.outputs.changed }}" == "true" ]; then
            echo "✅ **Changes Detected:** public fantasy snapshot artifacts were refreshed and committed." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️ **No Changes:** the published fantasy snapshot artifacts were already current." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Public artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "- src/data/fantasyPositionData.generated.ts" >> "$GITHUB_STEP_SUMMARY"
          echo "- src/data/fantasyAdpData.generated.ts" >> "$GITHUB_STEP_SUMMARY"
          echo "- src/data/fantasySnapshotRevision.generated.ts" >> "$GITHUB_STEP_SUMMARY"
          echo "- public/data/fantasy/ppr.json" >> "$GITHUB_STEP_SUMMARY"
          echo "- public/data/fantasy/half_ppr.json" >> "$GITHUB_STEP_SUMMARY"
          echo "- public/data/fantasy/standard.json" >> "$GITHUB_STEP_SUMMARY"

      - name: Notify on failure via GitHub issue
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `Fantasy refresh failed ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The **Refresh Fantasy Football Snapshots** workflow failed on ${today}.`,
              ``,
              `**Run:** ${runUrl}`,
              `**Commit:** ${context.sha}`,
              `**Trigger:** ${context.eventName}`,
              ``,
              `Check the run logs to diagnose. Common causes:`,
              `- FantasyPros HTML structure changed (\`var ecrData\` extraction failed)`,
              `- Sustained 429s exceeded retry budget`,
              `- Quality gate caught a degraded snapshot (thin overall board or an empty/short position board)`,
              ``,
              `Note: ADP fetch failures are non-fatal by design — they only surface as warnings, never as a failed run.`,
              ``,
              `This issue will be updated if the next run also fails, and auto-closed on the first successful run.`
            ].join('\n');
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fantasy-refresh-failure',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              const issue = existing.data[0];
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Failed again on ${today}. Run: ${runUrl}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['fantasy-refresh-failure', 'automation'],
              });
            }

      - name: Close resolved failure issues
        if: success()
        uses: actions/github-script@v9
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'fantasy-refresh-failure',
              per_page: 10,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Refresh succeeded at ${new Date().toISOString()}. Auto-closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
